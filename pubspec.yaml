name: aquasave
description: "AquaSave - App de monitoreo y riego inteligente"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Clean Architecture / Either
  dartz: ^0.10.1
  get_it: ^7.7.0
  http: ^1.6.0

  # Navegación
  go_router: ^14.2.7

  # Assets SVG
  flutter_svg: ^2.0.10+1

  # Persistencia (ThemeMode)
  shared_preferences: ^2.3.2
  google_fonts: ^8.1.0

  # Selección de imagen de perfil
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/favicon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/mock/
